name: Nix

on:
  push:
    branches: ["main"]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "package-lock.json"
      - ".github/workflows/nix.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "package-lock.json"
      - ".github/workflows/nix.yml"
  workflow_dispatch:

jobs:
  flake:
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runs-on: ubuntu-latest
          - system: aarch64-linux
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: flake check
        run: nix flake check --print-build-logs

      - name: build
        run: nix build ".#packages.${{ matrix.system }}.default" --print-build-logs

      - name: smoke test
        run: ./result/bin/torio --help
