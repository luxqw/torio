name: Deploy landing page to Pages

on:
  push:
    branches: [main]
    paths:
      - "web/index.html"

jobs:
  deploy:
    if: github.repository == 'y-tretyakov/torio'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
